# Optional reverse proxy for API (8000), wa-qr-ui (8501), whatsapp-bot (3100).
# Use only if you want a single entry point. Replace YOUR_DOMAIN and adjust server_name.
# Upstreams assume services run on same host (e.g. Docker published ports).

upstream api_backend {
    server 127.0.0.1:8000;
}
upstream wa_qr_ui_backend {
    server 127.0.0.1:8501;
}
upstream whatsapp_bot_backend {
    server 127.0.0.1:3100;
}

# API — e.g. api.YOUR_DOMAIN or port 8000
server {
    listen 80;
    server_name api.YOUR_DOMAIN;
    location / {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Streamlit wa-qr-ui — e.g. qr.YOUR_DOMAIN or port 8501 (WebSocket support)
server {
    listen 80;
    server_name qr.YOUR_DOMAIN;
    location / {
        proxy_pass http://wa_qr_ui_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

